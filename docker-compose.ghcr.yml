# ============================================
# Inventarverwaltung - Einfaches Docker Setup
# ============================================

version: '3.8'

services:
  inventarverwaltung:
    image: ghcr.io/swissneo85/inventarverwaltung:latest
    container_name: inventarverwaltung
    restart: unless-stopped
    ports:
      - "${PORT:-3004}:80"
    volumes:
      # Persistente Daten
      - ./data:/app/data
      - ./storage:/var/www/html/storage
    environment:
      # App Configuration
      - APP_NAME=Inventarverwaltung
      - APP_ENV=production
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=false
      - APP_URL=${APP_URL:-http://localhost:3004}
      
      # Database (SQLite für einfaches Single-Container Deployment)
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/app/data/database.sqlite
      
      # Sessions
      - SESSION_DRIVER=file
      
      # Generiere APP_KEY mit: openssl rand -base64 32

# ============================================
# Verwendung:
# ============================================
# 
# 1. docker-compose.yml erstellen:
#    Siehe unten - kopiere den services-Block
#
# 2. .env erstellen:
#    APP_KEY=base64:DEIN_GEHEIMER_KEY_HIER
#    APP_URL=http://deine-domain.com
#    PORT=3004
#
# 3. Starten:
#    docker-compose up -d
#
# 4. Login:
#    http://localhost:3004
#    Benutzer: admin
#    Passwort: admin123
#
# ============================================