version: '3.8'

services:
  # MariaDB Database
  db:
    image: mariadb:11.2
    container_name: inventar-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-inventar_root_secret_change_me}
      MYSQL_DATABASE: ${DB_DATABASE:-inventar}
      MYSQL_USER: ${DB_USERNAME:-inventar}
      MYSQL_PASSWORD: ${DB_PASSWORD:-inventar_secret_change_me}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - inventar-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Laravel Backend API
  backend:
    image: php:8.2-fpm-alpine
    container_name: inventar-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: Inventarverwaltung
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost}
      
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-inventar}
      DB_USERNAME: ${DB_USERNAME:-inventar}
      DB_PASSWORD: ${DB_PASSWORD:-inventar_secret_change_me}
      
      SESSION_DRIVER: database
      SESSION_LIFETIME: 120
      
      SANCTUM_STATEFUL_DOMAINS: ${FRONTEND_URL:-http://localhost}
      
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stderr
      LOG_LEVEL: error
    volumes:
      - ./backend:/var/www/html
      - backend_storage:/var/www/html/storage
    working_dir: /var/www/html
    networks:
      - inventar-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: inventar-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend:/var/www/html:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ssl_certs:/etc/nginx/ssl:ro
    networks:
      - inventar-network

volumes:
  db_data:
  backend_storage:
  ssl_certs:

networks:
  inventar-network:
    driver: bridge