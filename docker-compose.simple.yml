# ============================================
# Inventarverwaltung - Docker Compose Example
# Kopiere diese Datei zu docker-compose.yml
# ============================================

version: '3.8'

services:
  inventarverwaltung:
    image: ghcr.io/swissneo85/inventarverwaltung:latest
    container_name: inventarverwaltung
    restart: unless-stopped
    ports:
      - "${PORT:-3004}:80"
    volumes:
      - ./data:/app/data
      - ./storage:/var/www/html/storage
    environment:
      # App Configuration
      - APP_NAME=Inventarverwaltung
      - APP_ENV=production
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=false
      - APP_URL=${APP_URL:-http://localhost:3004}
      
      # Database (SQLite for single container)
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/app/data/database.sqlite
      
      # Security
      - SESSION_DRIVER=file
      - SANCTUM_STATEFUL_DOMAINS=${APP_URL:-http://localhost:3004}
      
      # Optional: MySQL/MariaDB
      # - DB_CONNECTION=mysql
      # - DB_HOST=${DB_HOST:-db}
      # - DB_PORT=${DB_PORT:-3306}
      # - DB_DATABASE=${DB_DATABASE:-inventar}
      # - DB_USERNAME=${DB_USERNAME:-inventar}
      # - DB_PASSWORD=${DB_PASSWORD:-change_me}