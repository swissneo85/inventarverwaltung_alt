# ============================================
# Inventarverwaltung - Docker Compose
# Für Hostinger VPS / Production
# ============================================

services:
  # MariaDB Database
  db:
    image: mariadb:11.2
    container_name: inventar-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change_me_root}
      MYSQL_DATABASE: ${DB_DATABASE:-inventar}
      MYSQL_USER: ${DB_USERNAME:-inventar}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change_me_user}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - inventar-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Laravel Backend API
  backend:
    image: ghcr.io/swissneo85/inventarverwaltung-backend:latest
    container_name: inventar-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: Inventarverwaltung
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost}
      
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-inventar}
      DB_USERNAME: ${DB_USERNAME:-inventar}
      DB_PASSWORD: ${DB_PASSWORD:-change_me_user}
      
      SESSION_DRIVER: database
      SESSION_LIFETIME: 120
      
      SANCTUM_STATEFUL_DOMAINS: ${FRONTEND_URL:-http://localhost}
      
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stderr
      LOG_LEVEL: error
    volumes:
      - backend_storage:/var/www/html/storage
    networks:
      - inventar-network

  # Vue.js Frontend + Reverse Proxy
  frontend:
    image: ghcr.io/swissneo85/inventarverwaltung-frontend:latest
    container_name: inventar-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${PORT:-3004}:80"
    environment:
      API_URL: ${API_URL:-http://backend}
    networks:
      - inventar-network

volumes:
  db_data:
  backend_storage:

networks:
  inventar-network:
    driver: bridge