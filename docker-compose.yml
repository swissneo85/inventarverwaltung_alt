services:
  inventarverwaltung:
    image: ghcr.io/swissneo85/inventarverwaltung:latest
    container_name: inventarverwaltung
    restart: unless-stopped
    ports:
      - "3004:80"
    volumes:
      - ./data:/app/data
      - ./storage:/var/www/html/storage/app/public
    environment:
      - APP_KEY=base64:CHANGE_ME